<!DOCTYPE html>
<html lang="{{ config.default_language }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ config.description }}{% endblock %}">
  <link rel="stylesheet" href="{{ get_url(path='main.css') }}">
  <script>
    (function () {
      var stored = null;
      try { stored = localStorage.getItem('reading-mode'); } catch (e) {}
      var mode = stored === 'flowing' ? 'flowing' : 'ventilated';
      document.documentElement.dataset.readingMode = mode;

      function syncButtons() {
        var btns = document.querySelectorAll('.reading-mode-toggle button[data-mode]');
        var current = document.documentElement.dataset.readingMode;
        for (var i = 0; i < btns.length; i++) {
          btns[i].setAttribute('aria-pressed', btns[i].dataset.mode === current ? 'true' : 'false');
        }
      }

      document.addEventListener('click', function (e) {
        var btn = e.target.closest && e.target.closest('.reading-mode-toggle button[data-mode]');
        if (!btn) return;
        var next = btn.dataset.mode === 'flowing' ? 'flowing' : 'ventilated';
        document.documentElement.dataset.readingMode = next;
        try { localStorage.setItem('reading-mode', next); } catch (e) {}
        syncButtons();
      });

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', syncButtons);
      } else {
        syncButtons();
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..700&family=Source+Sans+3:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap">
  {% if config.generate_feeds %}
  <link rel="alternate" type="application/atom+xml" title="{{ config.title }}" href="{{ get_url(path='atom.xml', trailing_slash=false) }}">
  {% endif %}
</head>
<body>
  <header class="site-header">
    <a href="{{ config.base_url }}" class="site-title">{{ config.title }}</a>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <p>{{ config.extra.author }}</p>
  </footer>
</body>
</html>
