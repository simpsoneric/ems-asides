{% extends "base.html" %}
{% block title %}#{{ term.name }} — {{ config.title }}{% endblock %}
{% block content %}
<article class="section">
  <h1>#{{ term.name }}</h1>
  <ul class="post-list">
    {% for page in term.pages %}
      <li>
        <a href="{{ page.permalink }}">{{ page.title }}</a>
        <time datetime="{{ page.date }}">{{ page.date | date(format='%Y-%m-%d') }}</time>
      </li>
    {% endfor %}
  </ul>
</article>
{% endblock %}
