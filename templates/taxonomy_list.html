{% extends "base.html" %}
{% block title %}{{ taxonomy.name | capitalize }} — {{ config.title }}{% endblock %}
{% block content %}
<article class="section">
  <h1>{{ taxonomy.name | capitalize }}</h1>
  <ul class="post-list">
    {% for term in terms %}
      <li>
        <a href="{{ term.permalink }}">#{{ term.name }}</a>
        <time>{{ term.pages | length }}</time>
      </li>
    {% endfor %}
  </ul>
</article>
{% endblock %}
